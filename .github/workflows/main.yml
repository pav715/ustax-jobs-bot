  name: US Tax Jobs Bot

  on:
    schedule:
      - cron: "*/5 * * * *"
    workflow_dispatch:

  jobs:
    run-bot:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Install dependencies
          run: pip install -r "Telegram Bot/requirements.txt"

        - name: Run bot cycle
          env:
            BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
            CHAT_ID: ${{ secrets.CHAT_ID }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          run: cd "Telegram Bot" && python run_once.py

        - name: Save seen_jobs.json back to repo
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "Telegram Bot/seen_jobs.json"
            git diff --staged --quiet || git commit -m "Update seen_jobs [skip ci]"
            git push
