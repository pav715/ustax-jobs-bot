  name: US Tax Jobs Bot

  on:
    schedule:
      - cron: "*/5 * * * *"
    workflow_dispatch:

  jobs:
    run-bot:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Show files (debug)
          run: find . -type f | sort

        - name: Install dependencies
          run: |
            REQ=$(find . -name "requirements.txt" | head -1)
            echo "Found: $REQ"
            pip install -r "$REQ"

        - name: Run bot cycle
          env:
            BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
            CHAT_ID: ${{ secrets.CHAT_ID }}
          run: |
            DIR=$(find . -name "run_once.py" | head -1 | xargs dirname)
            echo "Running from: $DIR"
            cd "$DIR" && python run_once.py

        - name: Save seen_jobs.json back to repo
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A seen_jobs.json
            git diff --staged --quiet || git commit -m "Update seen_jobs [skip ci]"
            git push
